<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-label="SmartInv — AI-Powered MRO Inventory Intelligence" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#10161F"/>
      <stop offset="100%" stop-color="#0A1E25"/>
    </linearGradient>

    <!-- Soft radial glows -->
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0E8C9C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0E8C9C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAI" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6D5AE6" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#6D5AE6" stop-opacity="0"/>
    </radialGradient>

    <!-- Wordmark gradient -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#5FD3E0"/>
      <stop offset="60%" stop-color="#0E8C9C"/>
      <stop offset="100%" stop-color="#6D5AE6"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Forecast band gradient -->
    <linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D5AE6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6D5AE6" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0 L0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <!-- Node halo -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5FD3E0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5FD3E0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="520" fill="url(#bgGrad)"/>
  <rect width="1600" height="520" fill="url(#grid)"/>

  <!-- Atmospheric glows -->
  <circle cx="280" cy="260" r="420" fill="url(#glowTeal)"/>
  <circle cx="1320" cy="280" r="420" fill="url(#glowAI)"/>

  <!-- ───── LEFT: branding ───── -->
  <g transform="translate(90,150)">
    <!-- Logo mark -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="68" height="68" rx="16" fill="#0E8C9C"/>
      <rect x="0" y="0" width="68" height="68" rx="16" fill="url(#cardGrad)"/>
      <path d="M14 46 L26 32 L34 40 L52 18" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 18 L54 18 L54 28" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Wordmark -->
    <text x="90" y="55" font-family="Space Grotesk, Inter, Segoe UI, sans-serif" font-size="74" font-weight="700" fill="url(#brandGrad)" letter-spacing="-2">SmartInv</text>

    <!-- Underline accent -->
    <rect x="92" y="76" width="220" height="3" rx="2" fill="url(#brandGrad)" opacity="0.85"/>

    <!-- Tagline -->
    <text x="92" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#C7D2DE" letter-spacing="0.2">AI-Powered MRO Inventory Intelligence</text>
    <text x="92" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="400" fill="#8B99A9">Reduce inventory cost — without increasing operational risk.</text>

    <!-- Pill badges -->
    <g transform="translate(92,180)" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="600">
      <g>
        <rect x="0" y="0" width="120" height="28" rx="14" fill="#0E8C9C" fill-opacity="0.18" stroke="#0E8C9C" stroke-opacity="0.55"/>
        <text x="60" y="19" text-anchor="middle" fill="#5FD3E0">EXPLAINABLE AI</text>
      </g>
      <g transform="translate(132,0)">
        <rect x="0" y="0" width="120" height="28" rx="14" fill="#6D5AE6" fill-opacity="0.18" stroke="#6D5AE6" stroke-opacity="0.55"/>
        <text x="60" y="19" text-anchor="middle" fill="#B6ABF6">AGENTIC</text>
      </g>
      <g transform="translate(264,0)">
        <rect x="0" y="0" width="140" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
        <text x="70" y="19" text-anchor="middle" fill="#DCE5EE">INDUSTRIAL-GRADE</text>
      </g>
    </g>
  </g>

  <!-- ───── RIGHT: stylized dashboard mockup ───── -->
  <g transform="translate(820,80)">
    <!-- Main "card": forecast widget -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="430" height="200" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="0" y="0" width="430" height="200" rx="14" fill="url(#cardGrad)"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8B99A9" letter-spacing="1.2">DEMAND FORECAST · P50/P80</text>
      <text x="18" y="56" font-family="Space Grotesk, sans-serif" font-size="26" font-weight="700" fill="#E5ECF3">Mech seal cartridge 80mm</text>

      <!-- Forecast band -->
      <path d="M18 150 L60 130 L100 145 L140 120 L180 135 L220 110 L260 125 L300 100 L340 115 L380 95 L412 105 L412 165 L380 155 L340 175 L300 160 L260 180 L220 165 L180 185 L140 170 L100 195 L60 185 L18 195 Z" fill="url(#bandGrad)"/>
      <!-- P50 line -->
      <path d="M18 165 L60 158 L100 170 L140 145 L180 158 L220 135 L260 150 L300 125 L340 140 L380 118 L412 128" fill="none" stroke="#6D5AE6" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Actual past -->
      <path d="M18 175 L60 170 L100 178 L140 162 L180 170 L220 155 L260 168" fill="none" stroke="#5FD3E0" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Today marker -->
      <line x1="260" y1="80" x2="260" y2="180" stroke="#C9D2DC" stroke-opacity="0.45" stroke-dasharray="3 4"/>
      <text x="266" y="92" font-family="JetBrains Mono, monospace" font-size="10" fill="#8B99A9">today</text>

      <!-- Evidence chips -->
      <g transform="translate(18,90)" font-family="Inter, sans-serif" font-size="11" font-weight="600">
        <g>
          <rect x="0" y="0" width="86" height="22" rx="6" fill="#6D5AE6" fill-opacity="0.18" stroke="#6D5AE6" stroke-opacity="0.4"/>
          <text x="43" y="15" text-anchor="middle" fill="#B6ABF6">conf 0.91</text>
        </g>
        <g transform="translate(94,0)">
          <rect x="0" y="0" width="78" height="22" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
          <text x="39" y="15" text-anchor="middle" fill="#DCE5EE">MASE 0.71</text>
        </g>
      </g>
    </g>

    <!-- KPI mini-cards (top right) -->
    <g transform="translate(450,0)">
      <g>
        <rect x="0" y="0" width="140" height="92" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <rect x="0" y="0" width="140" height="92" rx="12" fill="url(#cardGrad)"/>
        <text x="14" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B99A9" letter-spacing="1">SAFELY REDUCIBLE</text>
        <text x="14" y="58" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700" fill="#2E9E6B">$6.7M</text>
        <text x="14" y="78" font-family="Inter, sans-serif" font-size="11" fill="#8B99A9">▲ $410K newly identified</text>
      </g>
      <g transform="translate(0,108)">
        <rect x="0" y="0" width="140" height="92" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <rect x="0" y="0" width="140" height="92" rx="12" fill="url(#cardGrad)"/>
        <text x="14" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8B99A9" letter-spacing="1">CRITICAL STOCKOUT</text>
        <text x="14" y="58" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700" fill="#D64545">23<tspan font-size="14" fill="#8B99A9"> items</tspan></text>
        <text x="14" y="78" font-family="Inter, sans-serif" font-size="11" fill="#8B99A9">▼ 5 · $1.9M exposure</text>
      </g>
    </g>

    <!-- Agentic network (bottom) -->
    <g transform="translate(0,230)">
      <rect x="0" y="0" width="590" height="190" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="0" y="0" width="590" height="190" rx="14" fill="url(#cardGrad)"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8B99A9" letter-spacing="1.2">AGENT ORCHESTRATION · 6 specialized agents · governed by humans</text>

      <!-- Edges -->
      <g stroke="#5FD3E0" stroke-opacity="0.55" stroke-width="1.4" fill="none">
        <line x1="295" y1="110" x2="120" y2="70"/>
        <line x1="295" y1="110" x2="120" y2="150"/>
        <line x1="295" y1="110" x2="470" y2="70"/>
        <line x1="295" y1="110" x2="470" y2="150"/>
        <line x1="295" y1="110" x2="200" y2="55"/>
        <line x1="295" y1="110" x2="390" y2="55"/>
      </g>

      <!-- Central orchestrator -->
      <circle cx="295" cy="110" r="40" fill="url(#nodeGlow)"/>
      <circle cx="295" cy="110" r="26" fill="#6D5AE6"/>
      <circle cx="295" cy="110" r="26" fill="url(#cardGrad)"/>
      <text x="295" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff">ORCH</text>

      <!-- Outer agents -->
      <g font-family="Inter, sans-serif" font-size="10.5" font-weight="600" fill="#DCE5EE">
        <g>
          <circle cx="120" cy="70" r="18" fill="#0E8C9C"/>
          <text x="120" y="73" text-anchor="middle" fill="#ffffff">HEAL</text>
          <text x="120" y="100" text-anchor="middle">Inventory Health</text>
        </g>
        <g>
          <circle cx="120" cy="150" r="18" fill="#0E8C9C"/>
          <text x="120" y="153" text-anchor="middle" fill="#ffffff">RISK</text>
          <text x="120" y="180" text-anchor="middle">Risk</text>
        </g>
        <g>
          <circle cx="200" cy="55" r="14" fill="#0A6B78"/>
          <text x="200" y="83" text-anchor="middle">Narrative</text>
        </g>
        <g>
          <circle cx="390" cy="55" r="14" fill="#0A6B78"/>
          <text x="390" y="83" text-anchor="middle">Master Data</text>
        </g>
        <g>
          <circle cx="470" cy="70" r="18" fill="#0E8C9C"/>
          <text x="470" y="73" text-anchor="middle" fill="#ffffff">OPT</text>
          <text x="470" y="100" text-anchor="middle">Optimization</text>
        </g>
        <g>
          <circle cx="470" cy="150" r="18" fill="#0E8C9C"/>
          <text x="470" y="153" text-anchor="middle" fill="#ffffff">PROC</text>
          <text x="470" y="180" text-anchor="middle">Procurement</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Bottom hairline -->
  <rect x="0" y="518" width="1600" height="2" fill="#0E8C9C" opacity="0.6"/>
</svg>
