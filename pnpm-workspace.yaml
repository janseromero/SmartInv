packages:
  - "apps/*"
  - "packages/*"

# Dev-tooling dependencies that carry postinstall/build scripts. We do NOT run
# them — every one ships working prebuilt binaries and none run at production
# runtime — so they are explicitly set to false. Explicit booleans stop pnpm 11
# from re-prompting (otherwise it rewrites this block with placeholders).
allowBuilds:
  "@biomejs/biome": false
  "@swc/core": false
  esbuild: false
  msw: false

# Skip pnpm 11's pre-script "verify deps" check, which otherwise hard-fails on
# the ignored builds above even though every tool works from its prebuilt binary.
verifyDepsBeforeRun: false
