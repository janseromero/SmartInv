[project]
name = "smartinv"
version = "0.1.0"
description = "SmartInv — AI-Powered MRO Inventory Intelligence Platform"
requires-python = ">=3.12"
dependencies = [
    "litellm>=1.91.0",
]

[tool.uv.workspace]
members = ["services/*"]

[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
    # Infra connectivity tooling for CV1.E4 dev scripts. psycopg and boto3 are
    # provided by the api service (CV1.E5/E7); redis stays here for the cache
    # smoke-test script.
    "redis>=5.2.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit
    "T20", # flake8-print
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S608"]  # allow asserts and constant-identifier DDL in tests
# Dev scripts: imports follow a sys.path bootstrap (E402) and print to stdout (T20).
"scripts/**" = ["E402", "T201", "T203"]
# Alembic env bootstraps sys.path before importing the app (E402).
"services/api/alembic/env.py" = ["E402"]
# Migrations: long autogenerated DDL lines (E501) and constant-identifier DDL
# built with f-strings (S608) are expected.
"services/api/alembic/versions/*" = ["E501", "S608"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
# pgvector ships no type stubs / py.typed marker.
module = "pgvector.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# boto3 / botocore ship no bundled stubs.
module = ["boto3.*", "botocore.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["services"]
pythonpath = ["services/api/src"]
asyncio_mode = "auto"
