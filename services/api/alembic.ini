# Alembic configuration for the SmartInv API service (CV1.E5).
# The database URL is resolved at runtime from application settings in env.py,
# so it is intentionally left blank here.

[alembic]
script_location = services/api/alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set in env.py from SMARTINV_DATABASE_URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
